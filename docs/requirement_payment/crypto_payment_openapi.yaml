info:
  title: Crypto Payment API
  version: 1.0.0
openapi: 3.0.0
paths:
  /api/v1/plans:
    get:
      responses:
        '200':
          description: Plan list returned
      summary: Get subscription plans
  /api/v1/subscription/create:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                currency:
                  type: string
                network:
                  type: string
                planId:
                  type: integer
                userId:
                  type: integer
              type: object
        required: true
      responses:
        '200':
          description: Invoice created
      summary: Create subscription invoice
  /payment/api/v1/invoice:
    post:
      responses:
        '200':
          description: Invoice response
      summary: Create payment invoice
  /payment/api/v1/invoice/{id}:
    get:
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Invoice info
      summary: Get invoice status
